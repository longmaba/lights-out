<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Equalizer Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

      display: grid;
      place-items: center;
      color: #f8fafc;
    }

       PIXEL THEME
       ====================================================== */

      background-color: #0f0f1a;
      background-image: repeating-conic-gradient(#181825 0% 25%, #0f0f1a 0% 50%);
      background-size: 16px 16px;
      font-family: 'Press Start 2P', monospace;
      image-rendering: pixelated;
    }

    body.theme-pixel .game {
      width: min(96vw, 480px);
      background: #16213e;
      border: 4px solid #e2e8f0;
      box-shadow: 8px 8px 0 #000;
      padding: 20px;
    }

    body.theme-pixel h1 {
      font-size: 0.75rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #facc15;
      text-shadow: 3px 3px 0 #92400e;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    body.theme-pixel .subtitle {
      color: #94a3b8;
      text-align: center;
      font-size: 0.55rem;
      line-height: 2;
      margin-bottom: 14px;
      border: 2px solid #334155;
      padding: 8px;
      background: #0f172a;
    }

    body.theme-pixel .meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 14px;
      font-size: 0.52rem;
    }

    body.theme-pixel .meta span {
      border: 3px solid #334155;
      padding: 6px 4px;
      text-align: center;
      background: #0f172a;
      color: #7dd3fc;
      box-shadow: 3px 3px 0 #000;
      letter-spacing: 0.04em;
    }

    body.theme-pixel .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
      padding: 10px;
      background: #0f172a;
      border: 4px solid #334155;
    }

    body.theme-pixel .tile {
      aspect-ratio: 1 / 1;
      border: 3px solid #000;
      border-radius: 0;
      background: #1e293b;
      color: #f8fafc;

      cursor: pointer;
      position: relative;
      overflow: visible;
      box-shadow: 4px 4px 0 #000;
      transition: none;
      image-rendering: pixelated;

    body.theme-pixel .tile.value-1 {
      background: #334155;
      border-color: #64748b;
      color: #cbd5e1;
      box-shadow: 4px 4px 0 #0f172a;

    body.theme-pixel .tile.value-2 {
      background: #1d4ed8;
      border-color: #93c5fd;
      color: #dbeafe;
      box-shadow: 4px 4px 0 #1e3a8a;

    body.theme-pixel .tile.value-3 {
      background: #7c3aed;
      border-color: #c4b5fd;
      color: #ede9fe;
      box-shadow: 4px 4px 0 #4c1d95;

    body.theme-pixel .tile.value-4 {
      background: #b45309;
      border-color: #fcd34d;
      color: #fef3c7;
      box-shadow: 4px 4px 0 #78350f;

    body.theme-pixel .tile:not(:disabled):hover {

      filter: brightness(1.18);
    }

    body.theme-pixel .tile.value-1:not(:disabled):hover {
      box-shadow: 6px 6px 0 #0f172a;
    }

    body.theme-pixel .tile.value-2:not(:disabled):hover {
      box-shadow: 6px 6px 0 #1e3a8a;
    }

    body.theme-pixel .tile.value-3:not(:disabled):hover {
      box-shadow: 6px 6px 0 #4c1d95;
    }

    body.theme-pixel .tile.value-4:not(:disabled):hover {
      box-shadow: 6px 6px 0 #78350f;
    }

    body.theme-pixel .tile:not(:disabled):active {
      transform: translate(4px, 4px);
      box-shadow: none !important;

    body.theme-pixel .tile:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      filter: saturate(0.1) brightness(0.65);
      box-shadow: 2px 2px 0 #000;
    }

    body.theme-pixel .particle {
      position: absolute;
      left: var(--sx, 50%);
      top: var(--sy, 50%);
      width: 6px;
      height: 6px;
      border-radius: 0;
      background: #facc15;

      padding: 10px;
      text-align: center;
      font-size: 0.55rem;
      line-height: 2;
      border: 3px solid #334155;
      background: #0f172a;

    body.theme-pixel .status.win {

    body.theme-neon .btn {

    body.theme-neon .btn:hover {

    body.theme-neon .btn:active {

    body.theme-neon .btn:disabled {

    body.theme-neon #themeBtn {

    /* ======================================================
       SHARED
       ====================================================== */
    .tile-value {
      display: inline-block;
      position: relative;
      z-index: 2;
    }

    .tile-added {
      animation: tileShakeFlash 320ms steps(4, end);
    }

    @keyframes tileShakeFlash {
      0% {
        transform: translate(0, 0) rotate(0deg);
        filter: brightness(2.2);
      }

      20% {
        transform: translate(-4px, 1px) rotate(-4deg);
        filter: brightness(1.8);
      }

      40% {
        transform: translate(4px, -1px) rotate(4deg);
        filter: brightness(1.5);
      }

      60% {
        transform: translate(-3px, 0) rotate(-2.5deg);
        filter: brightness(1.3);
      }

      80% {
        transform: translate(3px, 0) rotate(2deg);
        filter: brightness(1.1);
      }

      100% {
        transform: translate(0, 0) rotate(0deg);
        filter: brightness(1);
      }

    @keyframes winBlink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }

    @keyframes stuckBlink {

      100% {

      100% {

        box-shadow: 0 0 28px rgb(251 146 60/50%);
      }

<body class="theme-pixel">
  <main class="game">
    <h1>Number Equalizer Arena</h1>
    <p class="subtitle">Click a tile > 1 to reduce it by 1 and add +1 to orthogonal neighbors. Move is blocked if any
      neighbor is already 4.</p>

    <div class="meta">
      <span id="levelLabel"></span>
      <span id="moveLabel"></span>
      <span id="hintLabel"></span>
    </div>

    <section class="board" id="board" aria-label="3 by 3 game board"></section>

    <p class="status" id="status"></p>

    <div class="controls">
      <button class="btn" id="restartBtn" type="button">Restart Level</button>
      <button class="btn" id="nextBtn" type="button">Next Level</button>
      <button class="btn" id="newPackBtn" type="button">New Pack</button>
      <button class="btn" id="themeBtn" type="button">🌟 Neon</button>
    </div>
  </main>

  <script>
    const SIZE = 3;
    const MIN = 1;
    const MAX = 4;
    const LEVEL_COUNT = 10;

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const levelLabelEl = document.getElementById('levelLabel');
    const moveLabelEl = document.getElementById('moveLabel');
    const hintLabelEl = document.getElementById('hintLabel');
    const restartBtn = document.getElementById('restartBtn');
    const nextBtn = document.getElementById('nextBtn');
    const newPackBtn = document.getElementById('newPackBtn');

    let levels = [];
    let currentLevel = 0;
    let state = [];
    let initialState = [];
    let moves = 0;
    let levelHintMoves = null;
    let lastAddedKeys = new Set();

    const minMovesCache = new Map();

    function cloneBoard(board) {
      return board.map((row) => row.slice());
    }

    function isAllEqual(board) {
      const target = board[0][0];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (board[r][c] !== target) {
            return false;
          }
        }
      }
      return true;
    }

    function getNeighbors(row, col) {
      const candidates = [
        [row - 1, col],
        [row + 1, col],
        [row, col - 1],
        [row, col + 1]
      ];
      return candidates.filter(([r, c]) => r >= 0 && r < SIZE && c >= 0 && c < SIZE);
    }

    function canApplyReverse(board, row, col) {
      if (board[row][col] >= MAX) {
        return false;
      }
      const neighbors = getNeighbors(row, col);
      return neighbors.every(([r, c]) => board[r][c] > MIN);
    }

    function boardToKey(board) {
      return board.flat().join('');
    }

    function keyToBoard(key) {
      const values = key.split('').map((digit) => Number(digit));
      const board = [];
      for (let r = 0; r < SIZE; r++) {
        board.push(values.slice(r * SIZE, (r + 1) * SIZE));
      }
      return board;
    }

    function canApplyForwardMoveOnBoard(board, row, col) {
      if (board[row][col] <= MIN) {
        return false;
      }

      return getNeighbors(row, col).every(([r, c]) => board[r][c] < MAX);
    }

    function applyForwardMoveOnBoard(board, row, col) {
      if (!canApplyForwardMoveOnBoard(board, row, col)) {
        return null;
      }

      const next = cloneBoard(board);
      next[row][col] -= 1;
      getNeighbors(row, col).forEach(([r, c]) => {
        next[r][c] += 1;
      });
      return next;
    }

    function findMinMovesToSolve(startBoard) {
      const startKey = boardToKey(startBoard);
      if (minMovesCache.has(startKey)) {
        return minMovesCache.get(startKey);
      }

      if (isAllEqual(startBoard)) {
        minMovesCache.set(startKey, 0);
        return 0;
      }

      const queue = [startKey];
      const dist = new Map([[startKey, 0]]);

      for (let head = 0; head < queue.length; head++) {
        const key = queue[head];
        const board = keyToBoard(key);
        const depth = dist.get(key);

        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            const nextBoard = applyForwardMoveOnBoard(board, r, c);
            if (!nextBoard) {
              continue;
            }

            const nextKey = boardToKey(nextBoard);
            if (dist.has(nextKey)) {
              continue;
            }

            const nextDepth = depth + 1;
            if (isAllEqual(nextBoard)) {
              minMovesCache.set(startKey, nextDepth);
              return nextDepth;
            }

            dist.set(nextKey, nextDepth);
            queue.push(nextKey);
          }
        }
      }

      minMovesCache.set(startKey, null);
      return null;
    }

    // Reverse generation move: +1 center, -1 neighbors.
    // Any board made this way is solvable by replaying forward moves.
    function applyReverse(board, row, col) {
      board[row][col] += 1;
      getNeighbors(row, col).forEach(([r, c]) => {
        board[r][c] -= 1;
      });
    }

    function createSolvedBoard(value) {
      return Array.from({ length: SIZE }, () => Array.from({ length: SIZE }, () => value));
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateWinnableLevel(reverseSteps) {
      for (let attempt = 0; attempt < 100; attempt++) {
        const solvedValue = randomInt(2, 3);
        const board = createSolvedBoard(solvedValue);

        for (let i = 0; i < reverseSteps; i++) {
          const legalMoves = [];
          for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
              if (canApplyReverse(board, r, c)) {
                legalMoves.push([r, c]);
              }
            }
          }

          if (legalMoves.length === 0) {
            break;
          }

          const [row, col] = legalMoves[randomInt(0, legalMoves.length - 1)];
          applyReverse(board, row, col);
        }

        if (!isAllEqual(board)) {
          return board;
        }
      }

      // Fallback static board, known to be solvable from an all-2 target.
      return [
        [2, 3, 2],
        [1, 3, 1],
        [2, 2, 2]
      ];
    }

    function generateLevelPack() {
      const pack = [];
      for (let i = 0; i < LEVEL_COUNT; i++) {
        const reverseSteps = 3 + i;
        pack.push(generateWinnableLevel(reverseSteps));
      }
      return pack;
    }

    function isWin() {
      return isAllEqual(state);
    }

    function isStuck() {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (canApplyForwardMoveOnBoard(state, r, c)) return false;
        }
      }
      return true;
    }

    function canApplyForwardMove(row, col) {
      return canApplyForwardMoveOnBoard(state, row, col);
    }

    function applyForwardMove(row, col) {
      const nextState = applyForwardMoveOnBoard(state, row, col);
      if (!nextState) {
        return false;
      }

      state = nextState;
      return true;
    }

    function tileKey(row, col) {
      return `${row},${col}`;
    }

    function addParticles(tileEl) {
      const particleCount = 22;
      const now = performance.now();
      const lifeMs = 400;

      for (let i = 0; i < particleCount; i++) {
        const p = document.createElement('span');
        p.className = 'particle';

        // Spawn from tile perimeter (slightly outside each edge).
        const side = Math.floor(Math.random() * 4);
        let sx = 50;
        let sy = 50;

        if (side === 0) {
          sx = -6;
          sy = Math.random() * 100;
        } else if (side === 1) {
          sx = 106;
          sy = Math.random() * 100;
        } else if (side === 2) {
          sx = Math.random() * 100;
          sy = -6;
        } else {
          sx = Math.random() * 100;
          sy = 106;
        }

        // Move in one fixed direction (no curvature) based on edge side.
        const speed = 0.08 + Math.random() * 0.03; // px/ms
        let vx = 0;
        let vy = 0;

        if (side === 0) {
          vx = -speed;
          vy = (Math.random() - 0.5) * speed * 0.2;
        } else if (side === 1) {
          vx = speed;
          vy = (Math.random() - 0.5) * speed * 0.2;
        } else if (side === 2) {
          vx = (Math.random() - 0.5) * speed * 0.2;
          vy = -speed;
        } else {
          vx = (Math.random() - 0.5) * speed * 0.2;
          vy = speed;
        }

        const spin = (Math.random() > 0.5 ? 1 : -1) * (80 + Math.random() * 160);

        p.style.setProperty('--sx', `${sx}%`);
        p.style.setProperty('--sy', `${sy}%`);
        p.style.opacity = '0';
        p.style.transform = 'translate(-50%, -50%)';
        tileEl.appendChild(p);

        const startAt = now;

        function step(ts) {
          if (!p.isConnected) {
            return;
          }

          const t = ts - startAt;
          const progress = Math.min(1, t / lifeMs);

          const x = vx * t;
          const y = vy * t;
          const rot = spin * progress;
          const scale = 1 - 0.55 * progress;
          const alpha = progress < 0.08 ? progress / 0.08 : Math.max(0, 1 - progress);

          p.style.opacity = alpha.toFixed(3);
          p.style.transform = `translate(calc(-50% + ${x.toFixed(2)}px), calc(-50% + ${y.toFixed(2)}px)) rotate(${rot.toFixed(1)}deg) scale(${scale.toFixed(3)})`;

          if (progress < 1) {
            requestAnimationFrame(step);
          } else {
            p.remove();
          }
        }

        requestAnimationFrame(step);
      }
    }

    function onTileClick(row, col) {
      if (isWin()) {
        return;
      }

      const moved = applyForwardMove(row, col);
      if (!moved) {
        statusEl.classList.remove('win');
        if (state[row][col] <= MIN) {
          statusEl.textContent = 'That tile is already 1. Choose a tile greater than 1.';
        } else {
          statusEl.textContent = 'Move blocked: a neighboring tile is already 4.';
        }
        render();
        return;
      }

      lastAddedKeys = new Set(getNeighbors(row, col).map(([r, c]) => tileKey(r, c)));
      moves += 1;
      render();
    }

    function loadLevel(index) {
      currentLevel = index;
      initialState = cloneBoard(levels[currentLevel]);
      state = cloneBoard(initialState);
      moves = 0;
      lastAddedKeys.clear();
      levelHintMoves = findMinMovesToSolve(initialState);
      render();
    }

    function render() {
      const won = isWin();
      const stuck = !won && isStuck();
      boardEl.innerHTML = '';

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const value = state[r][c];
          const btn = document.createElement('button');
          btn.className = `tile value-${value}`;
          btn.type = 'button';

          const valueEl = document.createElement('span');
          valueEl.className = 'tile-value';
          valueEl.textContent = String(value);
          btn.appendChild(valueEl);

          const addedThisTurn = lastAddedKeys.has(tileKey(r, c));
          if (addedThisTurn) {
            btn.classList.add('tile-added');
            addParticles(btn);
          }

          btn.disabled = won || stuck || !canApplyForwardMove(r, c);
          btn.addEventListener('click', () => onTileClick(r, c));
          boardEl.appendChild(btn);
        }
      }

      levelLabelEl.textContent = `Level ${currentLevel + 1}/${LEVEL_COUNT}`;
      moveLabelEl.textContent = `Moves: ${moves}`;
      hintLabelEl.textContent = levelHintMoves === null ? 'Hint: no known solution' : `Hint: ${levelHintMoves} moves`;

      if (won) {
        statusEl.classList.remove('stuck');
        statusEl.classList.add('win');
        const hintText = levelHintMoves === null ? '' : ` (hint was ${levelHintMoves})`;
        statusEl.textContent = `Solved in ${moves} moves${hintText}. All tiles are ${state[0][0]}.`;
      } else if (stuck) {
        statusEl.classList.remove('win');
        statusEl.classList.add('stuck');
        statusEl.textContent = 'No more moves! Restart to try again.';
      } else {
        statusEl.classList.remove('win', 'stuck');
        statusEl.textContent = 'Make all 9 tiles equal.';
      }

      nextBtn.disabled = !won || currentLevel === LEVEL_COUNT - 1;
      lastAddedKeys.clear();
    }

    restartBtn.addEventListener('click', () => {
      state = cloneBoard(initialState);
      moves = 0;
      render();
    });

    nextBtn.addEventListener('click', () => {
      if (currentLevel < LEVEL_COUNT - 1) {
        loadLevel(currentLevel + 1);
      }
    });

    newPackBtn.addEventListener('click', () => {
      levels = generateLevelPack();
      loadLevel(0);
    });

    const themeBtn = document.getElementById('themeBtn');
    themeBtn.addEventListener('click', () => {
      const isPixel = document.body.classList.contains('theme-pixel');
      document.body.className = isPixel ? 'theme-neon' : 'theme-pixel';
      themeBtn.textContent = isPixel ? '🎮 Pixel' : '🌟 Neon';
    });

    levels = generateLevelPack();
    loadLevel(0);
  </script>
</body>

</html>
