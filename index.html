<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Equalizer Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
</head>

<body class="theme-pixel">
  <main class="game">
    <h1>Number Equalizer Arena</h1>
    <p class="subtitle">Click a tile > 1 to reduce it by 1 and add +1 to orthogonal neighbors. Move is blocked if any
      neighbor is already 4.</p>

    <div class="meta">
      <span id="levelLabel"></span>
      <span id="moveLabel"></span>
      <span id="hintLabel"></span>
    </div>

    <section class="board" id="board" aria-label="3 by 3 game board"></section>

    <p class="status" id="status"></p>

    <div class="celebration-layer" id="celebrationLayer" aria-hidden="true"></div>

    <div class="controls">
      <button class="btn" id="restartBtn" type="button">Restart Level</button>
      <button class="btn" id="nextBtn" type="button">Next Level</button>
      <button class="btn" id="newPackBtn" type="button">New Pack</button>
      <button class="btn" id="tutorialBtn" type="button">Tutorial</button>
      <button class="btn" id="themeBtn" type="button">Neon Theme</button>
    </div>
  </main>

  <script type="module" src="./js/game-app.js"></script>
</body>

</html>
